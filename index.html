<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performance Feedback</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f5f5; color: #1a1a1a; font-family: Arial, sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px; }
    .card { width: 100%; max-width: 600px; background: #fff; border: 1px solid #d0d0d0; border-radius: 8px; padding: 36px 32px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .header { text-align: center; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 2px solid #1a1a1a; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #e0e0e0; }

    /* Login */
    #loginSection { text-align: center; padding: 24px 0; }
    .login-desc { font-size: .9rem; color: #555; margin-bottom: 20px; }
    .login-note { font-size: .8rem; color: #999; margin-top: 14px; }
    #googleSignInBtn { display: flex; justify-content: center; }

    /* User bar */
    #userBar { display: none; align-items: center; justify-content: space-between; background: #f9f9f9; border: 1px solid #d0d0d0; border-radius: 6px; padding: 10px 14px; margin-bottom: 20px; font-size: .85rem; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #1a1a1a; color: #fff; display: flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 700; flex-shrink: 0; }
    .user-name { font-weight: 700; }
    .user-email { font-size: .75rem; color: #666; }
    .logout-btn { background: none; border: 1px solid #bbb; border-radius: 4px; padding: 4px 10px; font-size: .75rem; cursor: pointer; color: #555; }
    .logout-btn:hover { background: #f0f0f0; }

    /* Tabs */
    #mainSection { display: none; }
    .tabs { display: flex; border-bottom: 2px solid #1a1a1a; margin-bottom: 24px; }
    .tab-btn { padding: 10px 20px; border: none; background: none; font-family: Arial, sans-serif; font-size: .9rem; font-weight: 700; cursor: pointer; color: #888; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab-btn.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Alerts */
    .alert { padding: 14px 16px; border-radius: 6px; font-size: .875rem; margin-bottom: 16px; }
    .alert-warning { background: #fff8e1; border: 1px solid #ffc107; color: #7a5c00; }
    .alert-info    { background: #e8f4fd; border: 1px solid #90caf9; color: #0d47a1; }
    .alert-success { background: #e8f5e9; border: 1px solid #a5d6a7; color: #1b5e20; }

    /* Autocomplete bawahan */
    .autocomplete-wrap { position: relative; }
    .autocomplete-input { width: 100%; background: #fff; border: 1px solid #bbb; border-radius: 4px; color: #1a1a1a; font-family: Arial, sans-serif; font-size: .95rem; padding: 10px 12px; outline: none; transition: border-color .15s; }
    .autocomplete-input:focus { border-color: #1a1a1a; }
    .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #1a1a1a; border-top: none; border-radius: 0 0 4px 4px; max-height: 220px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 4px 12px rgba(0,0,0,.1); }
    .autocomplete-list.open { display: block; }
    .autocomplete-item { padding: 10px 12px; cursor: pointer; font-size: .9rem; border-bottom: 1px solid #f0f0f0; }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover, .autocomplete-item.selected { background: #f5f5f5; }
    .autocomplete-item mark { background: none; font-weight: 700; color: #1a1a1a; }
    .autocomplete-empty { padding: 10px 12px; font-size: .875rem; color: #999; }


    .field { margin-bottom: 18px; }
    label { display: block; font-size: .8rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #444; margin-bottom: 6px; }
    input[type="text"], select, textarea { width: 100%; background: #fff; border: 1px solid #bbb; border-radius: 4px; color: #1a1a1a; font-family: Arial, sans-serif; font-size: .95rem; padding: 10px 12px; outline: none; transition: border-color .15s; }
    input:focus, select:focus, textarea:focus { border-color: #1a1a1a; }
    select { cursor: pointer; }
    textarea { resize: vertical; min-height: 130px; }
    .readonly-field { background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 4px; padding: 10px 12px; font-size: .95rem; min-height: 44px; }
    .predikat-badge { display: inline-block; padding: 3px 14px; border-radius: 4px; font-weight: 700; font-size: 1rem; background: #1a1a1a; color: #fff; }

    /* Mic */
    .textarea-wrap { position: relative; }
    .with-mic { padding-right: 52px !important; }
    .mic-btn { position: absolute; right: 10px; bottom: 10px; width: 36px; height: 36px; border-radius: 50%; border: 2px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #1a1a1a; outline: none; }
    .mic-btn::after { content: ''; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: background .15s, transform .15s; }
    .mic-btn:hover { background: #fff; }
    .mic-btn:hover::after { background: #1a1a1a; }
    .mic-btn.recording { background: #fff; animation: pulse 1.2s infinite; }
    .mic-btn.recording::after { background: #e53935; transform: scale(1.15); }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(0,0,0,.3)} 70%{box-shadow:0 0 0 10px rgba(0,0,0,0)} 100%{box-shadow:0 0 0 0 rgba(0,0,0,0)} }
    .status-bar { display: flex; align-items: center; gap: 7px; font-size: .8rem; color: #888; margin-top: 6px; min-height: 18px; }
    .status-bar.active { color: #1a1a1a; font-weight: 600; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; opacity: 0; }
    .status-bar.active .status-dot { opacity: 1; animation: blink .8s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* Upload */
    .upload-area { border: 2px dashed #bbb; border-radius: 6px; padding: 20px; text-align: center; cursor: pointer; transition: border-color .15s; position: relative; overflow: hidden; }
    .upload-area:hover { border-color: #1a1a1a; }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-label { font-size: .875rem; color: #888; pointer-events: none; }
    .upload-preview { margin-top: 10px; display: none; }
    .upload-preview img { max-width: 100%; max-height: 200px; border-radius: 4px; border: 1px solid #e0e0e0; }

    /* Button */
    .submit-btn { width: 100%; padding: 12px; border: 2px solid #1a1a1a; border-radius: 4px; font-family: Arial, sans-serif; font-size: .95rem; font-weight: 700; cursor: pointer; background: #1a1a1a; color: #fff; transition: background .15s, color .15s; margin-top: 8px; }
    .submit-btn:hover:not(:disabled) { background: #fff; color: #1a1a1a; }
    .submit-btn:disabled { opacity: .45; cursor: not-allowed; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(70px); background: #1a1a1a; color: #fff; border-radius: 4px; padding: 12px 20px; font-size: .875rem; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.2); transition: transform .35s ease, opacity .3s; opacity: 0; z-index: 100; min-width: 240px; max-width: 90vw; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-left: 4px solid #4caf50; }
    .toast.error   { border-left: 4px solid #f44336; }
  </style>
</head>
<body>
<div class="card">
  <div class="header"><h1>Performance Feedback</h1></div>

  <!-- Login -->
  <div id="loginSection">
    <p class="login-desc">Silakan login dengan akun BPJS Ketenagakerjaan Anda.</p>
    <div id="googleSignInBtn"></div>
    <p class="login-note">Hanya akun @bpjsketenagakerjaan.go.id yang diizinkan.</p>
  </div>

  <!-- User bar -->
  <div id="userBar">
    <div class="user-info">
      <div class="user-avatar" id="userInitial"></div>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-email" id="userEmail"></div>
      </div>
    </div>
    <button class="logout-btn" onclick="handleLogout()">Logout</button>
  </div>

  <!-- Main -->
  <div id="mainSection">
    <div class="tabs" id="tabsBar" style="display:none">
      <button class="tab-btn active" id="tabAtasanBtn" onclick="switchTab('atasan')">Sebagai Atasan</button>
      <button class="tab-btn"        id="tabBawahanBtn" onclick="switchTab('bawahan')">Sebagai Bawahan</button>
    </div>

    <!-- TAB ATASAN -->
    <div class="tab-content active" id="tabAtasan">
      <h2>Form Feedback Atasan</h2>
      <div class="field">
        <label>Pilih Bawahan</label>
        <div class="autocomplete-wrap">
          <input type="text" class="autocomplete-input" id="searchBawahan"
            placeholder="Ketik nama bawahan untuk mencari…"
            autocomplete="off"
            oninput="onSearchBawahan(this.value)"
            onfocus="onSearchBawahan(this.value)"
          />
          <div class="autocomplete-list" id="autocompleteList"></div>
        </div>
      </div>
      <div id="fieldPredikat" class="field" style="display:none">
        <label>Predikat Kinerja</label>
        <div class="readonly-field"><span class="predikat-badge" id="labelPredikat">-</span></div>
      </div>
      <div id="fieldPesan" class="field" style="display:none">
        <label>Pesan / Feedback</label>
        <div class="textarea-wrap">
          <textarea id="pesanAtasan" class="with-mic" placeholder="Ketik feedback Anda, atau tekan tombol record untuk bicara…" maxlength="3000"></textarea>
          <button type="button" class="mic-btn" id="micBtnAtasan"></button>
        </div>
        <div class="status-bar" id="statusBarAtasan">
          <span class="status-dot"></span>
          <span id="statusTextAtasan">Tekan tombol record untuk mulai merekam</span>
        </div>
      </div>
      <div id="fieldFoto" class="field" style="display:none">
        <label>Foto Bukti (wajib)</label>
        <div class="upload-area">
          <input type="file" id="inputFoto" accept="image/*" onchange="previewFoto(this)" />
          <p class="upload-label">Klik untuk pilih foto</p>
        </div>
        <div class="upload-preview" id="uploadPreview">
          <img id="previewImg" src="" alt="Preview" />
        </div>
      </div>
      <button class="submit-btn" id="submitAtasanBtn" style="display:none" onclick="doSubmitAtasan()">Submit Feedback</button>
    </div>

    <!-- TAB BAWAHAN -->
    <div class="tab-content" id="tabBawahan">
      <h2>Form Komitmen Bawahan</h2>
      <div id="bawahanContent"><div class="alert alert-info">Memuat data...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="toastIcon"></span><span id="toastMsg"></span>
</div>

<script>
  // ══════════════════════════════════════════
  //  KONFIGURASI
  // ══════════════════════════════════════════
  const CLIENT_ID      = "350866418738-vc2g5nrrtgbrr9rnm56v2lgv3t958v9j.apps.googleusercontent.com";
  const ALLOWED_DOMAIN = "bpjsketenagakerjaan.go.id";
  const SCOPES         = [
    "openid email profile",
    "https://www.googleapis.com/auth/spreadsheets",
    "https://www.googleapis.com/auth/drive.file"
  ].join(" ");

  // ══════════════════════════════════════════
  //   KONFIGURASI ADMIN — hanya diubah oleh admin
  // ══════════════════════════════════════════
  const SPREADSHEET_ID   = "1xMEvwqFP5fmEQv7N1MDAJzb1WGMAsJ77JqV6F7EQ0PY";   // ID Google Sheet
  const DRIVE_FOLDER_ID  = "1dTas8Fgu7Y_rqoB43e7LzeQlaw31Uv5c";  // ID folder Drive untuk foto

  const SHEET_KARYAWAN = "Karyawan";
  const SHEET_FEEDBACK = "Feedback";

  let accessToken     = null;
  let tokenClient     = null;
  let currentEmail    = "";
  let currentName     = "";
  let userRole        = null;
  let bawahanList     = [];
  let pilihanBawahan  = null;
  let feedbackBawahan = null;

  // Config helpers — langsung ambil dari konstanta
  const cfg = {
    sheetId()      { return SPREADSHEET_ID; },
    driveFolderId(){ return DRIVE_FOLDER_ID; }
  };

  // ══════════════════════════════════════════
  //  Google Sign-In + OAuth Token
  // ══════════════════════════════════════════
  window.onload = () => {
    google.accounts.id.initialize({
      client_id:     CLIENT_ID,
      callback:      handleCredentialResponse,
      hosted_domain: ALLOWED_DOMAIN
    });
    google.accounts.id.renderButton(
      document.getElementById("googleSignInBtn"),
      { theme: "outline", size: "large", width: 280 }
    );
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope:     SCOPES,
      callback:  handleTokenResponse
    });
  };

  function handleCredentialResponse(response) {
    const p = JSON.parse(atob(response.credential.split(".")[1]));
    if (!(p.email || "").endsWith("@" + ALLOWED_DOMAIN)) {
      showToast("error", "", "Akses ditolak. Gunakan akun @" + ALLOWED_DOMAIN);
      return;
    }
    currentEmail = p.email;
    currentName  = p.name || p.email;
    document.getElementById("userInitial").textContent = currentName.charAt(0).toUpperCase();
    document.getElementById("userName").textContent    = currentName;
    document.getElementById("userEmail").textContent   = currentEmail;
    document.getElementById("userBar").style.display   = "flex";
    document.getElementById("loginSection").style.display = "none";
    tokenClient.requestAccessToken({ prompt: "" });
  }

  function handleTokenResponse(resp) {
    if (resp.error) { showToast("error", "", "Gagal mendapat akses: " + resp.error); return; }
    accessToken = resp.access_token;
    loadRole();
  }

  function handleLogout() {
    accessToken = null; userRole = null; currentEmail = "";
    google.accounts.id.disableAutoSelect();
    document.getElementById("userBar").style.display      = "none";
    document.getElementById("mainSection").style.display  = "none";
    document.getElementById("loginSection").style.display = "block";
  }

  // ══════════════════════════════════════════
  //  Sheets API helpers
  // ══════════════════════════════════════════
  async function sheetsGet(range) {
    const id  = cfg.sheetId();
    if (!id) throw new Error("Spreadsheet ID belum diisi di Pengaturan.");
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}`,
      { headers: { Authorization: "Bearer " + accessToken } }
    );
    if (!res.ok) {
      if (res.status === 401) { tokenClient.requestAccessToken({ prompt: "" }); throw new Error("Sesi expired, silakan coba lagi."); }
      throw new Error("Sheets API error: " + res.status);
    }
    return (await res.json()).values || [];
  }

  async function sheetsAppend(sheetName, values) {
    const id  = cfg.sheetId();
    if (!id) throw new Error("Spreadsheet ID belum diisi di Pengaturan.");
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(sheetName + "!A1")}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
      {
        method:  "POST",
        headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
        body:    JSON.stringify({ values })
      }
    );
    if (!res.ok) throw new Error("Gagal simpan data: " + res.status);
    return res.json();
  }

  async function sheetsUpdate(range, values) {
    const id  = cfg.sheetId();
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,
      {
        method:  "PUT",
        headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
        body:    JSON.stringify({ values })
      }
    );
    if (!res.ok) throw new Error("Gagal update data: " + res.status);
    return res.json();
  }

  async function sheetsGetAll(sheetName) {
    return sheetsGet(sheetName + "!A2:Z");
  }

  // ══════════════════════════════════════════
  //  Deteksi peran
  // ══════════════════════════════════════════
  async function loadRole() {
    try {
      const rows      = await sheetsGetAll(SHEET_KARYAWAN);
      const email     = currentEmail.toLowerCase().trim();
      let isAtasan = false, isBawahan = false;

      rows.forEach(r => {
        if ((r[2] || "").toLowerCase().trim() === email) isAtasan  = true;
        if ((r[5] || "").toLowerCase().trim() === email) isBawahan = true;
      });

      userRole = { isAtasan, isBawahan, rows };
      setupMainSection();
    } catch(err) {
      showToast("error", "", "Gagal memuat data: " + err.message);
    }
  }

  function setupMainSection() {
    const ms = document.getElementById("mainSection");
    ms.style.display = "block";
    const { isAtasan, isBawahan } = userRole;

    if (!isAtasan && !isBawahan) {
      ms.innerHTML = `<div class="alert alert-warning">Akun Anda tidak terdaftar dalam sistem. Hubungi HR.</div>`;
      return;
    }

    document.getElementById("tabAtasanBtn").style.display  = isAtasan  ? "" : "none";
    document.getElementById("tabBawahanBtn").style.display = isBawahan ? "" : "none";
    document.getElementById("tabsBar").style.display       = (isAtasan && isBawahan) ? "flex" : "none";

    if (isAtasan)             { switchTab("atasan"); loadBawahanList(); }
    if (isBawahan)            { loadFeedbackBawahan(); }
    if (!isAtasan && isBawahan) switchTab("bawahan");

    setupMic("micBtnAtasan", "pesanAtasan", "statusBarAtasan", "statusTextAtasan");
  }

  function switchTab(tab) {
    document.getElementById("tabAtasan").classList.toggle("active",  tab === "atasan");
    document.getElementById("tabBawahan").classList.toggle("active", tab === "bawahan");
    document.getElementById("tabAtasanBtn").classList.toggle("active",  tab === "atasan");
    document.getElementById("tabBawahanBtn").classList.toggle("active", tab === "bawahan");
  }

  // ══════════════════════════════════════════
  //  Form Atasan
  // ══════════════════════════════════════════
  function loadBawahanList() {
    const email = currentEmail.toLowerCase().trim();
    bawahanList = (userRole.rows || [])
      .filter(r => (r[2] || "").toLowerCase().trim() === email)
      .map(r => ({
        npkBawahan:   r[3] || "",
        namaBawahan:  r[4] || "",
        emailBawahan: r[5] || "",
        predikat:     r[6] || "",
        kodeUnit:     r[7] || ""
      }));

    // Tutup dropdown kalau klik di luar
    document.addEventListener("click", e => {
      if (!e.target.closest(".autocomplete-wrap")) {
        document.getElementById("autocompleteList").classList.remove("open");
      }
    });
  }

  function onSearchBawahan(query) {
    const list = document.getElementById("autocompleteList");
    const q    = query.toLowerCase().trim();

    // Filter berdasarkan nama atau kode unit
    const hasil = q === ""
      ? bawahanList
      : bawahanList.filter(b =>
          b.namaBawahan.toLowerCase().includes(q) ||
          b.kodeUnit.toLowerCase().includes(q) ||
          b.npkBawahan.toLowerCase().includes(q)
        );

    if (hasil.length === 0) {
      list.innerHTML = `<div class="autocomplete-empty">Tidak ada hasil untuk "${query}"</div>`;
      list.classList.add("open");
      return;
    }

    list.innerHTML = hasil.map(b => {
      // Highlight teks yang cocok
      const nama = highlight(b.namaBawahan, q);
      const unit = b.kodeUnit ? ` <span style="color:#888;font-size:.8rem">— ${highlight(b.kodeUnit, q)}</span>` : "";
      return `<div class="autocomplete-item" onclick="pilihBawahan('${b.emailBawahan}')">${nama}${unit}</div>`;
    }).join("");

    list.classList.add("open");
  }

  function highlight(text, query) {
    if (!query) return text;
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return text;
    return text.substring(0, idx) +
           "<mark>" + text.substring(idx, idx + query.length) + "</mark>" +
           text.substring(idx + query.length);
  }

  function pilihBawahan(email) {
    pilihanBawahan = bawahanList.find(b => b.emailBawahan === email) || null;
    if (!pilihanBawahan) return;

    // Isi input dengan nama yang dipilih
    document.getElementById("searchBawahan").value = pilihanBawahan.namaBawahan +
      (pilihanBawahan.kodeUnit ? " — " + pilihanBawahan.kodeUnit : "");

    // Tutup dropdown
    document.getElementById("autocompleteList").classList.remove("open");

    // Tampilkan field lainnya
    onPilihBawahan();
  }

  function onPilihBawahan() {
    const show = !!pilihanBawahan;
    ["fieldPredikat","fieldPesan","fieldFoto","submitAtasanBtn"].forEach(id => {
      document.getElementById(id).style.display = show ? "" : "none";
    });
    if (pilihanBawahan) document.getElementById("labelPredikat").textContent = pilihanBawahan.predikat || "-";
  }

  function previewFoto(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById("previewImg").src = e.target.result;
      document.getElementById("uploadPreview").style.display = "block";
    };
    reader.readAsDataURL(file);
  }

  async function doSubmitAtasan() {
    if (!pilihanBawahan) { showToast("error", "", "Pilih bawahan dulu."); return; }
    const pesan = document.getElementById("pesanAtasan").value.trim();
    if (!pesan) { showToast("error", "", "Pesan tidak boleh kosong."); return; }
    const fotoFile = document.getElementById("inputFoto").files[0];
    if (!fotoFile) { showToast("error", "", "Foto bukti wajib diupload."); return; }

    const btn = document.getElementById("submitAtasanBtn");
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Menyimpan…';

    try {
      // Cek duplikat aktif
      const feedbacks = await sheetsGetAll(SHEET_FEEDBACK);
      const duplikat  = feedbacks.some(r =>
        (r[7] || "").toLowerCase().trim() === pilihanBawahan.emailBawahan.toLowerCase() &&
        (r[13] || "") === "Menunggu Bawahan"
      );
      if (duplikat) throw new Error("Masih ada feedback aktif untuk bawahan ini yang belum diselesaikan.");

      // Upload foto ke Drive
      const fotoUrl = await uploadFotoDrive(fotoFile);

      // Cari NPK & nama atasan dari sheet karyawan
      const email = currentEmail.toLowerCase().trim();
      const atasanRow = (userRole.rows || []).find(r => (r[2] || "").toLowerCase().trim() === email);
      const npkAtasan  = atasanRow ? atasanRow[0] : "";
      const namaAtasan = atasanRow ? atasanRow[1] : currentName;

      const idSesi = "SESI-" + Date.now();
      const now    = new Date().toLocaleString("id-ID", { timeZone: "Asia/Jakarta" });

      await sheetsAppend(SHEET_FEEDBACK, [[
        idSesi, now,
        npkAtasan, namaAtasan, currentEmail,
        pilihanBawahan.npkBawahan, pilihanBawahan.namaBawahan, pilihanBawahan.emailBawahan,
        pilihanBawahan.predikat, pesan, fotoUrl,
        "", "", "Menunggu Bawahan"
      ]]);

      showToast("success", "", "Feedback berhasil dikirim!");
      document.getElementById("searchBawahan").value  = "";
      document.getElementById("pesanAtasan").value    = "";
      document.getElementById("uploadPreview").style.display = "none";
      document.getElementById("inputFoto").value      = "";
      pilihanBawahan = null;
      onPilihBawahan();
    } catch(err) {
      showToast("error", "", err.message);
    } finally {
      btn.disabled = false; btn.innerHTML = "Submit Feedback";
    }
  }

  async function uploadFotoDrive(file) {
    const folderId = cfg.driveFolderId();
    const metadata = { name: "feedback_" + Date.now() + "_" + file.name };
    if (folderId) metadata.parents = [folderId];

    const form = new FormData();
    form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
    form.append("file", file);

    const res = await fetch(
      "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink",
      { method: "POST", headers: { Authorization: "Bearer " + accessToken }, body: form }
    );
    if (!res.ok) throw new Error("Gagal upload foto: " + res.status);
    const data = await res.json();

    // Set file agar bisa diakses siapapun di organisasi
    await fetch(`https://www.googleapis.com/drive/v3/files/${data.id}/permissions`, {
      method: "POST",
      headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
      body: JSON.stringify({ role: "reader", type: "domain", domain: ALLOWED_DOMAIN })
    });

    return data.webViewLink || `https://drive.google.com/file/d/${data.id}/view`;
  }

  // ══════════════════════════════════════════
  //  Form Bawahan
  // ══════════════════════════════════════════
  async function loadFeedbackBawahan() {
    try {
      const rows  = await sheetsGetAll(SHEET_FEEDBACK);
      const email = currentEmail.toLowerCase().trim();

      // Cari feedback terbaru dengan status "Menunggu Bawahan"
      for (let i = rows.length - 1; i >= 0; i--) {
        const r = rows[i];
        if ((r[7] || "").toLowerCase().trim() === email && (r[13] || "") === "Menunggu Bawahan") {
          feedbackBawahan = {
            rowIndex:    i + 2, // +2 karena header di baris 1, data mulai baris 2
            idSesi:      r[0],
            namaAtasan:  r[3],
            tglAtasan:   r[1],
            predikat:    r[8],
            pesanAtasan: r[9],
            fotoUrl:     r[10]
          };
          renderFormBawahan();
          return;
        }
      }
      feedbackBawahan = null;
      renderFormBawahan();
    } catch(err) {
      document.getElementById("bawahanContent").innerHTML =
        `<div class="alert alert-warning">Gagal memuat: ${err.message}</div>`;
    }
  }

  function renderFormBawahan() {
    const cont = document.getElementById("bawahanContent");
    if (!feedbackBawahan) {
      cont.innerHTML = `<div class="alert alert-warning"><strong>Belum ada feedback dari atasan.</strong><br>Silakan tunggu atasan Anda melakukan submit terlebih dahulu.</div>`;
      return;
    }
    const f = feedbackBawahan;
    cont.innerHTML = `
      <div class="alert alert-info">Feedback dari <strong>${f.namaAtasan}</strong> — ${f.tglAtasan}</div>
      <div class="field">
        <label>Predikat Kinerja Anda</label>
        <div class="readonly-field"><span class="predikat-badge">${f.predikat}</span></div>
      </div>
      <div class="field">
        <label>Pesan dari Atasan</label>
        <div class="readonly-field" style="min-height:100px;white-space:pre-wrap">${f.pesanAtasan}</div>
      </div>
      ${f.fotoUrl ? `<div class="field"><label>Foto Bukti</label><div class="readonly-field"><a href="${f.fotoUrl}" target="_blank">Lihat foto</a></div></div>` : ""}
      <div class="field">
        <label>Komitmen Anda</label>
        <div class="textarea-wrap">
          <textarea id="komitmenBawahan" class="with-mic" placeholder="Tuliskan komitmen Anda setelah menerima feedback ini…" maxlength="3000"></textarea>
          <button type="button" class="mic-btn" id="micBtnBawahan"></button>
        </div>
        <div class="status-bar" id="statusBarBawahan">
          <span class="status-dot"></span>
          <span id="statusTextBawahan">Tekan tombol record untuk mulai merekam</span>
        </div>
      </div>
      <button class="submit-btn" id="submitBawahanBtn" onclick="doSubmitBawahan()">Submit Komitmen</button>`;
    setupMic("micBtnBawahan", "komitmenBawahan", "statusBarBawahan", "statusTextBawahan");
  }

  async function doSubmitBawahan() {
    const komitmen = document.getElementById("komitmenBawahan").value.trim();
    if (!komitmen) { showToast("error", "", "Komitmen tidak boleh kosong."); return; }
    const btn = document.getElementById("submitBawahanBtn");
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Menyimpan…';
    try {
      const now = new Date().toLocaleString("id-ID", { timeZone: "Asia/Jakarta" });
      // Update kolom L (Tgl Bawahan), M (Komitmen), N (Status) pada baris yang sesuai
      const row = feedbackBawahan.rowIndex;
      await sheetsUpdate(`${SHEET_FEEDBACK}!L${row}:N${row}`, [[now, komitmen, "Selesai"]]);
      showToast("success", "", "Komitmen berhasil disimpan!");
      document.getElementById("bawahanContent").innerHTML =
        `<div class="alert alert-success"><strong>Terima kasih!</strong> Proses feedback selesai.</div>`;
    } catch(err) {
      showToast("error", "", err.message);
      btn.disabled = false; btn.innerHTML = "Submit Komitmen";
    }
  }

  // ══════════════════════════════════════════
  //  Speech Recognition
  // ══════════════════════════════════════════
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  function setupMic(micId, taId, sbId, stId) {
    if (!SR) return;
    const micBtn = document.getElementById(micId);
    const ta     = document.getElementById(taId);
    const sb     = document.getElementById(sbId);
    const st     = document.getElementById(stId);
    if (!micBtn || !ta) return;

    // Hapus listener lama supaya tidak menumpuk
    const newBtn = micBtn.cloneNode(true);
    micBtn.parentNode.replaceChild(newBtn, micBtn);

    const rec = new SR();
    rec.lang = "id-ID"; rec.continuous = true; rec.interimResults = true;
    let final = "", active = false;

    rec.onstart = () => {
      active = true;
      final  = ta.value;
      newBtn.classList.add("recording");
      sb.classList.add("active");
      st.textContent = "Sedang merekam… bicara sekarang";
    };

    rec.onresult = ev => {
      let interim = "";
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        const t = ev.results[i][0].transcript;
        if (ev.results[i].isFinal) final += t + " ";
        else interim += t;
      }
      ta.value = final + interim;
    };

    rec.onerror = () => {
      active = false;
      stopMicUI(newBtn, sb, st);
    };

    rec.onend = () => {
      if (active) { try { rec.start(); } catch(e) {} }
      else stopMicUI(newBtn, sb, st);
    };

    newBtn.addEventListener("click", async () => {
      if (active) {
        // Stop rekaman
        active = false;
        rec.stop();
        return;
      }
      // Mulai rekaman — minta izin mic dulu
      st.textContent = "Meminta izin mikrofon...";
      try {
        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        s.getTracks().forEach(t => t.stop());
        rec.start();
      } catch(e) {
        st.textContent = "Tekan tombol record untuk mulai merekam";
        showToast("error", "", "Izin mikrofon ditolak.");
      }
    });
  }

  function stopMicUI(btn, sb, st) {
    btn.classList.remove("recording"); sb.classList.remove("active");
    st.textContent = "Rekaman dihentikan";
    setTimeout(() => { st.textContent = "Tekan tombol record untuk mulai merekam"; }, 2500);
  }

  // ══════════════════════════════════════════
  //  Toast
  // ══════════════════════════════════════════
  let toastTimer = null;
  function showToast(type, icon, msg) {
    const t = document.getElementById("toast");
    document.getElementById("toastIcon").textContent = icon;
    document.getElementById("toastMsg").textContent  = msg;
    t.className = "toast " + type; t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 5000);
  }
</script>
